name: Project CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  python-services:
    name: Python service checks (${{ matrix.service }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - dialog-engine
          - gateway-python
          - input-handler-python
          - memory-python
          - long-term-memory-python
          - output-handler-python
          - async-workers
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audio dependencies
        if: ${{ matrix.service == 'dialog-engine' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg libsndfile1

      - name: Install dependencies
        run: |
          cd services/${{ matrix.service }}
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi
          pip install pytest pytest-asyncio pytest-mock flake8

      - name: Start service dependencies
        if: ${{ hashFiles(format('services/{0}/docker-compose.ci.yml', matrix.service)) != '' }}
        run: |
          docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml up -d
          if docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml ps | grep -q redis; then
            until docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml exec -T redis redis-cli ping >/dev/null 2>&1; do
              sleep 1
            done
          fi
          if docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml ps | grep -q postgres; then
            until docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml exec -T postgres pg_isready >/dev/null 2>&1; do
              sleep 1
            done
          fi

      - name: Lint with flake8
        run: |
          cd services/${{ matrix.service }}
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics --exclude .git,__pycache__,venv,.venv

      - name: Run pytest
        env:
          PYTHONPATH: ${{ github.workspace }}/services/${{ matrix.service }}/src:${{ github.workspace }}/services/${{ matrix.service }}
          REDIS_URL: redis://localhost:6379
          REDIS_HOST: localhost
          REDIS_PORT: 6379
        run: |
          cd services/${{ matrix.service }}
          if [ -d tests ]; then
            if find tests -type f \( -name "test_*.py" -o -name "*_test.py" \) | grep -q .; then
              pytest -q
            else
              echo "No tests found for ${{ matrix.service }}, skipping tests."
            fi
          else
            echo "No tests directory for ${{ matrix.service }}, skipping tests."
          fi

      - name: Collect dependency logs
        if: ${{ always() && hashFiles(format('services/{0}/docker-compose.ci.yml', matrix.service)) != '' }}
        run: docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml logs

      - name: Shutdown service dependencies
        if: ${{ always() && hashFiles(format('services/{0}/docker-compose.ci.yml', matrix.service)) != '' }}
        run: docker compose -f services/${{ matrix.service }}/docker-compose.ci.yml down

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm --dir front_end run lint

      - name: Run unit tests
        run: pnpm --dir front_end exec vitest --run

      - name: Build
        run: pnpm --dir front_end run build
