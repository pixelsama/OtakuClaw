name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release-macos:
    name: Build and Release macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (macOS)
        run: |
          pnpm run frontend:build
          pnpm exec electron-builder --publish never

      - name: Prepare release assets
        run: |
          rm -rf release-assets
          mkdir -p release-assets
          for file in release/*.dmg release/*.zip release/*.yml release/*.blockmap; do
            if [ -f "$file" ]; then
              base_name="$(basename "$file")"
              safe_name="${base_name// /.}"
              cp "$file" "release-assets/$safe_name"
            fi
          done

      - name: Generate checksums
        run: |
          cd release-assets
          assets_list="$(mktemp)"
          find . -maxdepth 1 -type f \( -name '*.dmg' -o -name '*.zip' -o -name '*.yml' -o -name '*.blockmap' \) -print0 > "$assets_list"

          if [ ! -s "$assets_list" ]; then
            echo "No release assets found in release-assets/."
            rm -f "$assets_list"
            exit 1
          fi

          xargs -0 shasum -a 256 < "$assets_list" > checksums-macos.txt
          rm -f "$assets_list"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/*.dmg
            release-assets/*.zip
            release-assets/*.yml
            release-assets/*.blockmap
            release-assets/checksums-macos.txt
