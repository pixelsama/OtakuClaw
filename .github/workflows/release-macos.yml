name: Release macOS

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release-macos:
    name: Build and Release macOS
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build desktop (macOS)
        run: pnpm run desktop:build -- --publish never

      - name: Generate checksums
        run: |
          cd release
          assets=()
          for pattern in *.dmg *.zip *.yml *.blockmap; do
            for file in $pattern; do
              if [ -f "$file" ]; then
                assets+=("$file")
              fi
            done
          done

          if [ "${#assets[@]}" -eq 0 ]; then
            echo "No release assets found in release/."
            exit 1
          fi

          shasum -a 256 "${assets[@]}" > checksums-macos.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/*.dmg
            release/*.zip
            release/*.yml
            release/*.blockmap
            release/checksums-macos.txt
